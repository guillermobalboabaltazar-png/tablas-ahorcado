<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⏳ Ahorcado de Tablas · Opciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* (Los estilos son los mismos que en la versión anterior, no los repito aquí para no alargar,
           pero están incluidos en el código completo que te doy abajo) */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Quicksand',sans-serif; background:linear-gradient(145deg,#f7f0fc 0%,#e8def0 100%); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        #root { width:100%; max-width:720px; }
        /* ... resto de estilos ... (se incluyen en el código completo) */
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.20/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const TABLA_MIN = 2;
        const TABLA_MAX = 15;
        const MAX_MULTIPLICADOR = 10;
        const CORRECTAS_PARA_DOMINAR = 10;
        const MAX_ERRORES = 7;
        const TIEMPO_PREGUNTA = 8;
        const NUM_OPCIONES = 6;

        // ─── COMPONENTE AHORCADO SVG ───
        function Hangman({ errores }) {
            return (
                <div className="hangman-container">
                    <svg className="hangman-svg" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
                        <line x1="10" y1="120" x2="90" y2="120" stroke="#2d1b3a" strokeWidth="3" />
                        <line x1="30" y1="120" x2="30" y2="10" stroke="#2d1b3a" strokeWidth="3" />
                        <line x1="30" y1="10" x2="70" y2="10" stroke="#2d1b3a" strokeWidth="3" />
                        <line x1="70" y1="10" x2="70" y2="25" stroke="#2d1b3a" strokeWidth="3" />
                        <line x1="70" y1="25" x2="70" y2="35" stroke="#2d1b3a" strokeWidth="2.5" className={`body-part ${errores >= 1 ? 'visible' : ''}`} />
                        <circle cx="70" cy="42" r="8" stroke="#2d1b3a" strokeWidth="2.5" className={`body-part ${errores >= 2 ? 'visible' : ''}`} />
                        <line x1="70" y1="50" x2="70" y2="72" stroke="#2d1b3a" strokeWidth="2.5" className={`body-part ${errores >= 3 ? 'visible' : ''}`} />
                        <line x1="70" y1="55" x2="53" y2="68" stroke="#2d1b3a" strokeWidth="2.5" className={`body-part ${errores >= 4 ? 'visible' : ''}`} />
                        <line x1="70" y1="55" x2="87" y2="68" stroke="#2d1b3a" strokeWidth="2.5" className={`body-part ${errores >= 5 ? 'visible' : ''}`} />
                        <line x1="70" y1="72" x2="56" y2="95" stroke="#2d1b3a" strokeWidth="2.5" className={`body-part ${errores >= 6 ? 'visible' : ''}`} />
                        <line x1="70" y1="72" x2="84" y2="95" stroke="#2d1b3a" strokeWidth="2.5" className={`body-part ${errores >= 7 ? 'visible' : ''}`} />
                    </svg>
                </div>
            );
        }

        // ─── COMPONENTE PRINCIPAL ───
        function App() {
            const [nombre, setNombre] = useState('');
            const [empezado, setEmpezado] = useState(false);

            const [tablaActual, setTablaActual] = useState(TABLA_MIN);
            const [aciertosEnTabla, setAciertosEnTabla] = useState(0);
            const [tablasDominadas, setTablasDominadas] = useState(new Set());
            const [errores, setErrores] = useState(0);

            const [multiplicando, setMultiplicando] = useState(2);
            const [multiplicador, setMultiplicador] = useState(1);
            const [opciones, setOpciones] = useState([]);
            const [respuestaSeleccionada, setRespuestaSeleccionada] = useState(null); // null, índice numérico, o -1 (timeout)
            const [feedback, setFeedback] = useState({ mensaje: '', tipo: '' });
            const [feedbackAnim, setFeedbackAnim] = useState(false);

            const [esperandoSiguiente, setEsperandoSiguiente] = useState(false);
            const [contadorPreguntas, setContadorPreguntas] = useState(0);
            const [modoRepaso, setModoRepaso] = useState(false);
            const [tablaRepaso, setTablaRepaso] = useState(null);
            const [estadoJuego, setEstadoJuego] = useState('jugando');

            const [tiempoRestante, setTiempoRestante] = useState(TIEMPO_PREGUNTA);
            const timerIntervalRef = useRef(null);

            const [repeticiones, setRepeticiones] = useState({});

            const timeoutRef = useRef(null);

            // ─── LIMPIAR TEMPORIZADOR ───
            const limpiarTimer = useCallback(() => {
                if (timerIntervalRef.current) {
                    clearInterval(timerIntervalRef.current);
                    timerIntervalRef.current = null;
                }
            }, []);

            // ─── AGREGAR REPETICIÓN ───
            const agregarRepeticion = useCallback((tabla, mult) => {
                const clave = `${tabla}-${mult}`;
                setRepeticiones(prev => {
                    const newRep = { ...prev };
                    newRep[clave] = (newRep[clave] || 0) + 10;
                    return newRep;
                });
            }, []);

            // ─── GENERAR OPCIONES ───
            const generarOpciones = (correcto) => {
                const opcionesSet = new Set();
                opcionesSet.add(correcto);
                let intentos = 0;
                const maxIntentos = 1000;
                while (opcionesSet.size < NUM_OPCIONES && intentos < maxIntentos) {
                    const offset = Math.floor(Math.random() * 20) + 1;
                    const signo = Math.random() < 0.5 ? 1 : -1;
                    let candidato = correcto + signo * offset;
                    if (candidato < 1) candidato = correcto + offset;
                    if (!opcionesSet.has(candidato) && candidato > 0) {
                        opcionesSet.add(candidato);
                    }
                    intentos++;
                }
                let fallback = 1;
                while (opcionesSet.size < NUM_OPCIONES) {
                    if (!opcionesSet.has(fallback) && fallback !== correcto) {
                        opcionesSet.add(fallback);
                    }
                    fallback++;
                }
                const arr = Array.from(opcionesSet);
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            };

            // ─── GENERAR PREGUNTA (con prioridad de repeticiones) ───
            const generarPregunta = useCallback(() => {
                const claves = Object.keys(repeticiones).filter(k => repeticiones[k] > 0);
                if (claves.length > 0) {
                    const clave = claves[0];
                    const [tabla, mult] = clave.split('-').map(Number);
                    setRepeticiones(prev => {
                        const newRep = { ...prev };
                        newRep[clave] = newRep[clave] - 1;
                        if (newRep[clave] <= 0) delete newRep[clave];
                        return newRep;
                    });
                    return { multiplicando: tabla, multiplicador: mult, esRepeticion: true };
                } else {
                    const mult = Math.floor(Math.random() * MAX_MULTIPLICADOR) + 1;
                    return { multiplicando: tablaActual, multiplicador: mult, esRepeticion: false };
                }
            }, [repeticiones, tablaActual]);

            // ─── CARGAR NUEVA PREGUNTA ───
            const cargarNuevaPregunta = useCallback(() => {
                if (estadoJuego !== 'jugando') return;

                const pregunta = generarPregunta();
                const mult = pregunta.multiplicando;
                const mult2 = pregunta.multiplicador;
                const correcto = mult * mult2;
                const opcs = generarOpciones(correcto);

                setMultiplicando(mult);
                setMultiplicador(mult2);
                setOpciones(opcs);
                setRespuestaSeleccionada(null);
                setModoRepaso(pregunta.esRepeticion);
                setTablaRepaso(pregunta.esRepeticion ? mult : null);
                setEsperandoSiguiente(false);
                setFeedback({ mensaje: '', tipo: '' });
                setFeedbackAnim(false);

                // Iniciar temporizador
                limpiarTimer();
                setTiempoRestante(TIEMPO_PREGUNTA);
                timerIntervalRef.current = setInterval(() => {
                    setTiempoRestante(prev => {
                        if (prev <= 1) {
                            clearInterval(timerIntervalRef.current);
                            timerIntervalRef.current = null;
                            // Timeout → error
                            manejarTimeout(mult, mult2);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
            }, [estadoJuego, generarPregunta, limpiarTimer]);

            // ─── MANEJAR TIMEOUT ───
            const manejarTimeout = useCallback((tabla, mult) => {
                if (estadoJuego !== 'jugando' || esperandoSiguiente) return;

                // Agregar repetición
                agregarRepeticion(tabla, mult);

                const correcto = tabla * mult;
                setFeedback({ mensaje: `⏰ ¡Tiempo! ${tabla} × ${mult} = ${correcto}`, tipo: 'wrong' });
                setFeedbackAnim(true);

                // Consumir un corazón
                const nuevosErrores = errores + 1;
                setErrores(nuevosErrores);
                if (!modoRepaso) {
                    setAciertosEnTabla(0);
                }

                // Revelar la respuesta correcta en las opciones (sin seleccionar ninguna)
                setRespuestaSeleccionada(-1); // -1 indica timeout, para mostrar la correcta

                if (nuevosErrores >= MAX_ERRORES) {
                    setEstadoJuego('gameover');
                    setEsperandoSiguiente(true);
                    setFeedback({ mensaje: '💀 ¡Has sido ahorcado!', tipo: 'wrong' });
                    limpiarTimer();
                    return;
                }

                // Bloquear interacción y pasar a siguiente después de 1.2s
                setEsperandoSiguiente(true);
                limpiarTimer();
                setTimeout(() => {
                    cargarNuevaPregunta();
                }, 1200);
            }, [errores, modoRepaso, estadoJuego, esperandoSiguiente, agregarRepeticion, limpiarTimer, cargarNuevaPregunta]);

            // ─── AVANZAR TABLA ───
            const avanzarTabla = useCallback(() => {
                const siguiente = tablaActual + 1;
                if (siguiente <= TABLA_MAX) {
                    setTablaActual(siguiente);
                    setAciertosEnTabla(0);
                    setFeedback({ mensaje: `🎉 ¡Tabla del ${tablaActual} dominada! → Ahora tabla del ${siguiente}`, tipo: 'success' });
                } else {
                    setEstadoJuego('victoria');
                    setFeedback({ mensaje: `🏆 ¡FELICIDADES! Dominaste todas las tablas del ${TABLA_MIN} al ${TABLA_MAX}! 🏆`, tipo: 'success' });
                    setEsperandoSiguiente(true);
                    limpiarTimer();
                }
            }, [tablaActual, limpiarTimer]);

            // ─── PROCESAR RESPUESTA (clic en opción) ───
            const procesarRespuesta = useCallback((indice) => {
                if (esperandoSiguiente || estadoJuego !== 'jugando' || respuestaSeleccionada !== null) return;
                const valor = opciones[indice];
                const correcto = multiplicando * multiplicador;
                const esCorrecto = valor === correcto;

                limpiarTimer();
                setRespuestaSeleccionada(indice);
                setContadorPreguntas(prev => prev + 1);

                if (esCorrecto) {
                    setFeedback({ mensaje: `✅ ¡Muy bien! ${multiplicando} × ${multiplicador} = ${correcto}`, tipo: 'correct' });
                    setFeedbackAnim(true);

                    if (!modoRepaso) {
                        const nuevosAciertos = aciertosEnTabla + 1;
                        setAciertosEnTabla(nuevosAciertos);
                        if (nuevosAciertos >= CORRECTAS_PARA_DOMINAR) {
                            const nuevasDominadas = new Set(tablasDominadas);
                            nuevasDominadas.add(tablaActual);
                            setTablasDominadas(nuevasDominadas);
                            setEsperandoSiguiente(true);
                            avanzarTabla();
                            return;
                        }
                    }
                    // Siguiente inmediata (con pequeño delay para ver feedback)
                    setEsperandoSiguiente(true);
                    setTimeout(() => {
                        cargarNuevaPregunta();
                    }, 800);
                } else {
                    // Error
                    setFeedback({ mensaje: `❌ ¡Oh no! ${multiplicando} × ${multiplicador} = ${correcto}`, tipo: 'wrong' });
                    setFeedbackAnim(true);

                    agregarRepeticion(multiplicando, multiplicador);

                    const nuevosErrores = errores + 1;
                    setErrores(nuevosErrores);
                    if (!modoRepaso) {
                        setAciertosEnTabla(0);
                    }

                    if (nuevosErrores >= MAX_ERRORES) {
                        setEstadoJuego('gameover');
                        setEsperandoSiguiente(true);
                        setFeedback({ mensaje: '💀 ¡Has sido ahorcado!', tipo: 'wrong' });
                        return;
                    }

                    setEsperandoSiguiente(true);
                    setTimeout(() => {
                        cargarNuevaPregunta();
                    }, 1200);
                }
            }, [opciones, multiplicando, multiplicador, esperandoSiguiente, aciertosEnTabla, tablasDominadas,
                tablaActual, modoRepaso, errores, estadoJuego, respuestaSeleccionada, limpiarTimer, agregarRepeticion,
                avanzarTabla, cargarNuevaPregunta
            ]);

            // ─── REINICIAR ───
            const reiniciarJuego = useCallback(() => {
                limpiarTimer();
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                setTablaActual(TABLA_MIN);
                setAciertosEnTabla(0);
                setTablasDominadas(new Set());
                setErrores(0);
                setContadorPreguntas(0);
                setModoRepaso(false);
                setTablaRepaso(null);
                setFeedback({ mensaje: '🔄 ¡Reiniciado!', tipo: 'info' });
                setEsperandoSiguiente(false);
                setRespuestaSeleccionada(null);
                setEstadoJuego('jugando');
                setRepeticiones({});
                setTiempoRestante(TIEMPO_PREGUNTA);
                cargarNuevaPregunta();
            }, [limpiarTimer, cargarNuevaPregunta]);

            // ─── EFECTO INICIAL ───
            useEffect(() => {
                if (empezado) {
                    cargarNuevaPregunta();
                }
            }, [empezado, cargarNuevaPregunta]);

            const dominadasArray = [...tablasDominadas].sort((a, b) => a - b);
            const masteryPercent = Math.min(100, (aciertosEnTabla / CORRECTAS_PARA_DOMINAR) * 100);
            const vidasRestantes = MAX_ERRORES - errores;

            let timerClass = '';
            if (tiempoRestante <= 3) timerClass = 'danger';
            else if (tiempoRestante <= 5) timerClass = 'warning';

            // ─── RENDER ───

            if (!empezado) {
                return (
                    <div className="game-card welcome">
                        <span className="emoji-big">⏳</span>
                        <h1>Ahorcado de Tablas</h1>
                        <p className="subtitle">✨ 8 segundos · 6 opciones · 7 oportunidades ✨</p>
                        <div className="name-input-group">
                            <label htmlFor="nombreInput">👧 ¿Cómo te llamas?</label>
                            <input
                                id="nombreInput"
                                className="name-input"
                                type="text"
                                value={nombre}
                                onChange={(e) => setNombre(e.target.value)}
                                placeholder="Escribe tu nombre..."
                                onKeyDown={(e) => { if (e.key === 'Enter' && nombre.trim()) setEmpezado(true); }}
                                autoFocus
                            />
                            <button className="btn-start" onClick={() => { if (nombre.trim()) setEmpezado(true); }} disabled={!nombre.trim()}>
                                🚀 ¡Jugar!
                            </button>
                        </div>
                        <div style={{ marginTop: 16, fontSize: 14, color: '#7a5a8f' }}>
                            ⏱️ Contesta antes de que se acabe el tiempo.<br />
                            ❌ Cada fallo (incluido tiempo agotado) añade una parte del ahorcado (7 errores = pierdes).<br />
                            🔁 Las operaciones falladas se repiten 10 veces para aprender.
                        </div>
                    </div>
                );
            }

            return (
                <div className="game-card">
                    <div className="header">
                        <div className="game-title">🎯 Tablas <span>{tablaActual}</span></div>
                        <div className="vidas">❤️ {vidasRestantes} / {MAX_ERRORES}</div>
                    </div>

                    <div className="table-progress">
                        <div className="table-badge">{tablaActual} <small>×</small></div>
                        <div className="mastery-bar">
                            <div className="mastery-track"><div className="mastery-fill" style={{ width: `${masteryPercent}%` }} /></div>
                            <span className="mastery-label">{Math.round(masteryPercent)}%</span>
                        </div>
                    </div>

                    {dominadasArray.length > 0 && (
                        <div className="mastered-chips">
                            {dominadasArray.map(t => <span key={t} className="mastered-chip">✅ {t}</span>)}
                            {modoRepaso && <span className="mastered-chip review">🔄 repaso {tablaRepaso}</span>}
                        </div>
                    )}

                    <div className="timer-container">
                        <div className="timer-bar"><div className={`timer-fill ${timerClass}`} style={{ width: `${(tiempoRestante / TIEMPO_PREGUNTA) * 100}%` }} /></div>
                        <span className="timer-text">{tiempoRestante}s</span>
                    </div>

                    <Hangman errores={errores} />

                    <div className="question-area">
                        <div className="question-text">
                            <span className="highlight">{multiplicando}</span>
                            <span className="sign">×</span>
                            <span className="highlight">{multiplicador}</span>
                            <span className="eq">=</span>
                            <span style={{ minWidth: 50, display: 'inline-block', color: '#aa88c4' }}>?</span>
                        </div>

                        <div className="options-grid">
                            {opciones.map((valor, idx) => {
                                let clase = 'option-btn';
                                const correcto = multiplicando * multiplicador;
                                if (respuestaSeleccionada !== null) {
                                    // Si es timeout (respuestaSeleccionada === -1) y es la correcta, resaltar en verde
                                    if (respuestaSeleccionada === -1) {
                                        if (valor === correcto) clase += ' reveal-correct';
                                    } else {
                                        if (idx === respuestaSeleccionada) {
                                            clase += valor === correcto ? ' correct-answer' : ' wrong-answer';
                                        } else if (valor === correcto) {
                                            clase += ' reveal-correct';
                                        }
                                    }
                                }
                                const disabled = esperandoSiguiente || estadoJuego !== 'jugando' || respuestaSeleccionada !== null;
                                return (
                                    <button key={idx} className={clase} onClick={() => procesarRespuesta(idx)} disabled={disabled}>
                                        {valor}
                                    </button>
                                );
                            })}
                        </div>

                        <div className={`feedback ${feedback.tipo} ${feedbackAnim ? 'bounce-in' : ''}`}>
                            {feedback.mensaje}
                        </div>
                    </div>

                    {(estadoJuego === 'gameover' || estadoJuego === 'victoria') && (
                        <div className={`game-over-overlay ${estadoJuego === 'victoria' ? 'win-overlay' : ''}`}>
                            <h2>{estadoJuego === 'gameover' ? '💀 ¡Game Over!' : '🎉 ¡Ganaste!'}</h2>
                            <p className="sub">
                                {estadoJuego === 'gameover'
                                    ? `Has cometido ${errores} errores. ¡Ánimo, inténtalo de nuevo!`
                                    : `¡Dominaste todas las tablas del ${TABLA_MIN} al ${TABLA_MAX}! Eres una campeona.`}
                            </p>
                            <button className="btn-secondary success" onClick={reiniciarJuego} style={{ marginTop: 12 }}>🔄 Volver a jugar</button>
                        </div>
                    )}

                    <div className="action-row">
                        <button className="btn-secondary" onClick={reiniciarJuego}>🔄 Reiniciar</button>
                        <button className="btn-secondary" onClick={() => { limpiarTimer(); cargarNuevaPregunta(); }} disabled={estadoJuego !== 'jugando'}>⏭ Siguiente</button>
                    </div>

                    <div style={{ marginTop: 14, fontSize: 13, color: '#9a80ab' }}>
                        👧 {nombre} · {dominadasArray.length} tablas dominadas · {contadorPreguntas} preguntas
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
