    <title>⏳ Ahorcado de Tablas</title>

    <style>
        /* ─── ESTILOS (IDÉNTICOS, SIN CAMBIOS) ─── */
        * {

            padding: 0;

        body {

        .mastery-bar {

        .question-area {

        .options-grid {

        .option-btn {

            0%,

            25% {

            }
            75% {
                transform: translateX(8px);
            }

            animation: bounceIn 0.4s ease;

<body>
    <div id="root"></div>
    <div id="pwa-badge" class="pwa-badge">📲 Instalar Juego</div>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.20/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const TABLA_MIN = 2;
        const TABLA_MAX = 15;
        const MAX_MULTIPLICADOR = 10;
        const CORRECTAS_PARA_DOMINAR = 10;
        const MAX_ERRORES = 7;
        const TIEMPO_PREGUNTA = 8;
        const NUM_OPCIONES = 6;

        // ─── FUNCIONES DE LOCALSTORAGE ───
        const obtenerRecords = () => {
            try {
                const records = localStorage.getItem('ahorcadoRecords');
                return records ? JSON.parse(records) : [];
            } catch {
                return [];
            }
        };

        const guardarRecords = (records) => {
            try {
                localStorage.setItem('ahorcadoRecords', JSON.stringify(records));
            } catch {
                console.error('No se pudo guardar los records');
            }
        };

        const obtenerTablaProgress = (nombre) => {
            try {
                const key = `ahorcadoProgress-${nombre}`;
                const progress = localStorage.getItem(key);
                return progress ? parseInt(progress, 10) : TABLA_MIN;
            } catch {
                return TABLA_MIN;
            }
        };

        const guardarTablaProgress = (nombre, tabla) => {
            try {
                if (tabla >= 10) {
                    const key = `ahorcadoProgress-${nombre}`;
                    localStorage.setItem(key, tabla.toString());
                }
            } catch {
                console.error('No se pudo guardar el progreso');
            }
        };

        const agregarRecord = (nombre, tablaAlcanzada, score) => {
            const records = obtenerRecords();
            const nuevoRecord = {
                nombre,
                tablaAlcanzada,
                score,
                fecha: new Date().toLocaleDateString('es-ES')
            };
            records.push(nuevoRecord);
            records.sort((a, b) => b.score - a.score || b.tablaAlcanzada - a.tablaAlcanzada);
            const top3 = records.slice(0, 3);
            guardarRecords(top3);
        };

        // ─── COMPONENTE AHORCADO SVG ───
        function Hangman({ errores }) {
            return (
                <div className="hangman-container">
                    <svg className="hangman-svg" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
                        <line x1="10" y1="120" x2="90" y2="120" stroke="#2d1b3a" strokeWidth="3" />
                        <line x1="30" y1="120" x2="30" y2="10" stroke="#2d1b3a" strokeWidth="3" />
                        <line x1="30" y1="10" x2="70" y2="10" stroke="#2d1b3a" strokeWidth="3" />
                        <line x1="70" y1="10" x2="70" y2="25" stroke="#2d1b3a" strokeWidth="3" />
                        <line x1="70" y1="25" x2="70" y2="35" stroke="#2d1b3a" strokeWidth="2.5"
                        className={`body-part ${errores >= 1 ? 'visible' : ''}`} />
                        <circle cx="70" cy="42" r="8" stroke="#2d1b3a" strokeWidth="2.5"
                        className={`body-part ${errores >= 2 ? 'visible' : ''}`} />
                        <line x1="70" y1="50" x2="70" y2="72" stroke="#2d1b3a" strokeWidth="2.5"
                        className={`body-part ${errores >= 3 ? 'visible' : ''}`} />
                        <line x1="70" y1="55" x2="53" y2="68" stroke="#2d1b3a" strokeWidth="2.5"
                        className={`body-part ${errores >= 4 ? 'visible' : ''}`} />
                        <line x1="70" y1="55" x2="87" y2="68" stroke="#2d1b3a" strokeWidth="2.5"
                        className={`body-part ${errores >= 5 ? 'visible' : ''}`} />
                        <line x1="70" y1="72" x2="56" y2="95" stroke="#2d1b3a" strokeWidth="2.5"
                        className={`body-part ${errores >= 6 ? 'visible' : ''}`} />
                        <line x1="70" y1="72" x2="84" y2="95" stroke="#2d1b3a" strokeWidth="2.5"
                        className={`body-part ${errores >= 7 ? 'visible' : ''}`} />
                    </svg>
                </div>
            );
        }

        // ─── COMPONENTE PRINCIPAL ───
        function App() {
            const [nombre, setNombre] = useState('');
            const [empezado, setEmpezado] = useState(false);
            const [tablaActual, setTablaActual] = useState(TABLA_MIN);
            const [tablaInicial, setTablaInicial] = useState(TABLA_MIN);
            const [usarProgreso, setUsarProgreso] = useState(false);
            const [tablaProgressDisponible, setTablaProgressDisponible] = useState(TABLA_MIN);
            const [aciertosEnTabla, setAciertosEnTabla] = useState(0);
            const [tablasDominadas, setTablasDominadas] = useState(new Set());
            const [errores, setErrores] = useState(0);
            const [score, setScore] = useState(0);
            const [multiplicando, setMultiplicando] = useState(2);
            const [multiplicador, setMultiplicador] = useState(1);
            const [opciones, setOpciones] = useState([]);
            const [respuestaSeleccionada, setRespuestaSeleccionada] = useState(null);
            const [feedback, setFeedback] = useState({ mensaje: '', tipo: '' });
            const [feedbackAnim, setFeedbackAnim] = useState(false);
            const [esperandoSiguiente, setEsperandoSiguiente] = useState(false);
            const [contadorPreguntas, setContadorPreguntas] = useState(0);
            const [modoRepaso, setModoRepaso] = useState(false);
            const [tablaRepaso, setTablaRepaso] = useState(null);
            const [estadoJuego, setEstadoJuego] = useState('jugando');
            const [tiempoRestante, setTiempoRestante] = useState(TIEMPO_PREGUNTA);
            const timerIntervalRef = useRef(null);
            const loadTimeoutRef = useRef(null);
            const timeoutActivoRef = useRef(false);
            const [repeticiones, setRepeticiones] = useState({});
            const [records, setRecords] = useState([]);
            const deferredPromptRef = useRef(null);

            // ─── CARGAR RECORDS AL INICIO ───
            useEffect(() => {
                setRecords(obtenerRecords());
            }, []);

            // ─── PWA INSTALL PROMPT ───
            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    deferredPromptRef.current = e;
                    document.getElementById('pwa-badge').classList.add('show');
                };

                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);

                // Mostrar badge en phones
                if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                    if (!navigator.standalone) {
                        document.getElementById('pwa-badge').classList.add('show');
                    }
                }

                return () => {
                    window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                };
            }, []);

            // ─── CLICK EN BADGE ───
            useEffect(() => {
                const badge = document.getElementById('pwa-badge');
                const handleClick = () => {
                    if (deferredPromptRef.current) {
                        deferredPromptRef.current.prompt();
                        deferredPromptRef.current.userChoice.then((choiceResult) => {
                            if (choiceResult.outcome === 'accepted') {
                                console.log('PWA instalado');
                                badge.classList.remove('show');
                            }
                            deferredPromptRef.current = null;
                        });
                    }
                };

                badge.addEventListener('click', handleClick);
                return () => badge.removeEventListener('click', handleClick);
            }, []);

            // ─── LIMPIAR TODOS LOS TEMPORIZADORES ───
            const limpiarTimers = useCallback(() => {
                if (timerIntervalRef.current) {
                    clearInterval(timerIntervalRef.current);
                    timerIntervalRef.current = null;
                }
                if (loadTimeoutRef.current) {
                    clearTimeout(loadTimeoutRef.current);
                    loadTimeoutRef.current = null;
                }
                timeoutActivoRef.current = false;
            }, []);

            // ─── AGREGAR REPETICIÓN ───
            const agregarRepeticion = useCallback((tabla, mult) => {
                const clave = `${tabla}-${mult}`;
                setRepeticiones(prev => {
                    const newRep = { ...prev };
                    newRep[clave] = (newRep[clave] || 0) + 10;
                    return newRep;
                });
            }, []);

            // ─── GENERAR OPCIONES ───
            const generarOpciones = (correcto) => {
                const opcionesSet = new Set();
                opcionesSet.add(correcto);
                let intentos = 0;
                const maxIntentos = 1000;
                while (opcionesSet.size < NUM_OPCIONES && intentos < maxIntentos) {
                    const offset = Math.floor(Math.random() * 20) + 1;
                    const signo = Math.random() < 0.5 ? 1 : -1;
                    let candidato = correcto + signo * offset;
                    if (candidato < 1) candidato = correcto + offset;
                    if (!opcionesSet.has(candidato) && candidato > 0) {
                        opcionesSet.add(candidato);
                    }
                    intentos++;
                }
                let fallback = 1;
                while (opcionesSet.size < NUM_OPCIONES) {
                    if (!opcionesSet.has(fallback) && fallback !== correcto) {
                        opcionesSet.add(fallback);
                    }
                    fallback++;
                }
                const arr = Array.from(opcionesSet);
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            };

            // ─── GENERAR PREGUNTA ───
            const generarPregunta = useCallback(() => {
                const claves = Object.keys(repeticiones).filter(k => repeticiones[k] > 0);
                if (claves.length > 0) {
                    const clave = claves[0];
                    const [tabla, mult] = clave.split('-').map(Number);
                    setRepeticiones(prev => {
                        const newRep = { ...prev };
                        newRep[clave] = newRep[clave] - 1;
                        if (newRep[clave] <= 0) delete newRep[clave];
                        return newRep;
                    });
                    return { multiplicando: tabla, multiplicador: mult, esRepeticion: true };
                } else {
                    const mult = Math.floor(Math.random() * MAX_MULTIPLICADOR) + 1;
                    return { multiplicando: tablaActual, multiplicador: mult, esRepeticion: false };
                }
            }, [repeticiones, tablaActual]);

            // ─── CARGAR NUEVA PREGUNTA ───
            const cargarNuevaPregunta = useCallback(() => {
                if (estadoJuego !== 'jugando') return;
                limpiarTimers();
                timeoutActivoRef.current = false;
                const pregunta = generarPregunta();
                const mult = pregunta.multiplicando;
                const mult2 = pregunta.multiplicador;
                const correcto = mult * mult2;
                const opcs = generarOpciones(correcto);
                setMultiplicando(mult);
                setMultiplicador(mult2);
                setOpciones(opcs);
                setRespuestaSeleccionada(null);
                setModoRepaso(pregunta.esRepeticion);
                setTablaRepaso(pregunta.esRepeticion ? mult : null);
                setEsperandoSiguiente(false);
                setFeedback({ mensaje: '', tipo: '' });
                setFeedbackAnim(false);
                setTiempoRestante(TIEMPO_PREGUNTA);
                timerIntervalRef.current = setInterval(() => {
                    setTiempoRestante(prev => {
                        if (prev <= 1) {
                            clearInterval(timerIntervalRef.current);
                            timerIntervalRef.current = null;
                            if (!timeoutActivoRef.current) {
                                manejarTimeout(mult, mult2);
                            }
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
            }, [estadoJuego, generarPregunta, limpiarTimers]);

            // ─── MANEJAR TIMEOUT ───
            const manejarTimeout = useCallback((tabla, mult) => {
                if (estadoJuego !== 'jugando' || esperandoSiguiente) return;
                if (timeoutActivoRef.current) return;
                timeoutActivoRef.current = true;
                agregarRepeticion(tabla, mult);
                setFeedback({ mensaje: `⏰ ¡Tiempo! ${tabla} × ${mult} = ${tabla * mult}`, tipo: 'wrong' });
                setFeedbackAnim(true);
                const nuevosErrores = errores + 1;
                setErrores(nuevosErrores);
                setScore(prev => prev - 1);
                if (!modoRepaso) {
                    setAciertosEnTabla(0);
                }
                if (nuevosErrores >= MAX_ERRORES) {
                    setEstadoJuego('gameover');
                    setEsperandoSiguiente(true);
                    setFeedback({ mensaje: '💀 ¡Has sido ahorcado!', tipo: 'wrong' });
                    limpiarTimers();
                    timeoutActivoRef.current = false;
                    agregarRecord(nombre, tablaActual - 1, score - 1);
                    guardarTablaProgress(nombre, tablaActual - 1);
                    return;
                }
                setRespuestaSeleccionada(-1);
                setEsperandoSiguiente(true);
                limpiarTimers();
                loadTimeoutRef.current = setTimeout(() => {
                    timeoutActivoRef.current = false;
                    cargarNuevaPregunta();
                }, 1200);
            }, [errores, modoRepaso, estadoJuego, esperandoSiguiente, agregarRepeticion, limpiarTimers, cargarNuevaPregunta, nombre, tablaActual, score]);

            // ─── AVANZAR TABLA ───
            const avanzarTabla = useCallback(() => {
                const siguiente = tablaActual + 1;
                if (siguiente <= TABLA_MAX) {
                    setTablaActual(siguiente);
                    setAciertosEnTabla(0);
                    setFeedback({ mensaje: `🎉 ¡Tabla del ${tablaActual} dominada! → Ahora tabla del ${siguiente}`,
                        tipo: 'success' });
                } else {
                    setEstadoJuego('victoria');
                    setFeedback({ mensaje: `🏆 ¡FELICIDADES! Dominaste todas las tablas del ${tablaInicial} al ${TABLA_MAX}! 🏆`,
                        tipo: 'success' });
                    setEsperandoSiguiente(true);
                    limpiarTimers();
                    timeoutActivoRef.current = false;
                    agregarRecord(nombre, TABLA_MAX, score);
                    guardarTablaProgress(nombre, TABLA_MAX);
                }
            }, [tablaActual, limpiarTimers, nombre, tablaInicial, score]);

            // ─── PROCESAR RESPUESTA ───
            const procesarRespuesta = useCallback((indice) => {
                if (esperandoSiguiente || estadoJuego !== 'jugando' || respuestaSeleccionada !== null) return;
                const valor = opciones[indice];
                const correcto = multiplicando * multiplicador;
                const esCorrecto = valor === correcto;
                limpiarTimers();
                timeoutActivoRef.current = false;
                setRespuestaSeleccionada(indice);
                setContadorPreguntas(prev => prev + 1);
                if (esCorrecto) {
                    setFeedback({ mensaje: `✅ ¡Muy bien! ${multiplicando} × ${multiplicador} = ${correcto}`,
                    tipo: 'correct' });
                    setFeedbackAnim(true);
                    setScore(prev => prev + 1);
                    if (!modoRepaso) {
                        const nuevosAciertos = aciertosEnTabla + 1;
                        setAciertosEnTabla(nuevosAciertos);
                        if (nuevosAciertos >= CORRECTAS_PARA_DOMINAR) {
                            const nuevasDominadas = new Set(tablasDominadas);
                            nuevasDominadas.add(tablaActual);
                            setTablasDominadas(nuevasDominadas);
                            setEsperandoSiguiente(true);
                            avanzarTabla();
                            return;
                        }
                    }
                    setEsperandoSiguiente(true);
                    loadTimeoutRef.current = setTimeout(() => {
                        cargarNuevaPregunta();
                    }, 800);
                } else {
                    setFeedback({ mensaje: `❌ ¡Oh no! ${multiplicando} × ${multiplicador} = ${correcto}`, tipo: 'wrong' });
                    setFeedbackAnim(true);
                    setScore(prev => prev - 1);
                    agregarRepeticion(multiplicando, multiplicador);
                    const nuevosErrores = errores + 1;
                    setErrores(nuevosErrores);
                    if (!modoRepaso) {
                        setAciertosEnTabla(0);
                    }
                    if (nuevosErrores >= MAX_ERRORES) {
                        setEstadoJuego('gameover');
                        setEsperandoSiguiente(true);
                        setFeedback({ mensaje: '💀 ¡Has sido ahorcado!', tipo: 'wrong' });
                        agregarRecord(nombre, tablaActual - 1, score - 1);
                        guardarTablaProgress(nombre, tablaActual - 1);
                        return;
                    }
                    setEsperandoSiguiente(true);
                    loadTimeoutRef.current = setTimeout(() => {
                        cargarNuevaPregunta();
                    }, 1200);
                }
            }, [opciones, multiplicando, multiplicador, esperandoSiguiente, aciertosEnTabla, tablasDominadas,
                tablaActual, modoRepaso, errores, estadoJuego, respuestaSeleccionada, limpiarTimers,
                agregarRepeticion, avanzarTabla, cargarNuevaPregunta, nombre, score
            ]);

            // ─── REINICIAR ───
            const reiniciarJuego = useCallback(() => {
                limpiarTimers();
                timeoutActivoRef.current = false;
                setTablaActual(tablaInicial);
                setAciertosEnTabla(0);
                setTablasDominadas(new Set());
                setErrores(0);
                setScore(0);
                setContadorPreguntas(0);
                setModoRepaso(false);
                setTablaRepaso(null);
                setFeedback({ mensaje: '🔄 ¡Reiniciado!', tipo: 'info' });
                setEsperandoSiguiente(false);
                setRespuestaSeleccionada(null);
                setEstadoJuego('jugando');
                setRepeticiones({});
                setTiempoRestante(TIEMPO_PREGUNTA);
                cargarNuevaPregunta();
            }, [limpiarTimers, cargarNuevaPregunta, tablaInicial]);

            // ─── EFECTO INICIAL ───
            useEffect(() => {
                if (empezado) {
                    cargarNuevaPregunta();
                }
                return () => limpiarTimers();
            }, [empezado, cargarNuevaPregunta, limpiarTimers]);

            // ─── MANEJAR INICIO CON PROGRESO ───
            const manejarEmpezar = (conProgreso = false) => {
                if (!nombre.trim()) return;
                const tablaProgress = obtenerTablaProgress(nombre);
                if (conProgreso && tablaProgress >= 10) {
                    setTablaInicial(tablaProgress);
                    setTablaActual(tablaProgress);
                } else {
                    setTablaInicial(TABLA_MIN);
                    setTablaActual(TABLA_MIN);
                }
                setEmpezado(true);
            };

            // ─── DETECTAR SI HAY PROGRESO DISPONIBLE ───
            useEffect(() => {
                if (nombre.trim()) {
                    const progress = obtenerTablaProgress(nombre);
                    setTablaProgressDisponible(progress);
                    setUsarProgreso(progress >= 10);
                }
            }, [nombre]);

            const dominadasArray = [...tablasDominadas].sort((a, b) => a - b);
            const masteryPercent = Math.min(100, (aciertosEnTabla / CORRECTAS_PARA_DOMINAR) * 100);
            const vidasRestantes = MAX_ERRORES - errores;
            let timerClass = '';
            if (tiempoRestante <= 3) timerClass = 'danger';
            else if (tiempoRestante <= 5) timerClass = 'warning';

            // ─── RENDER ───
            if (!empezado) {
                return (
                    <div className="game-card welcome">
                        <span className="emoji-big">⏳</span>
                        <h1>Ahorcado de Tablas</h1>
                        <p className="subtitle">✨ 8 segundos · 6 opciones · 7 oportunidades ✨</p>
                        <div className="name-input-group">
                            <label htmlFor="nombreInput">👧 ¿Cómo te llamas?</label>
                            <input
                                id="nombreInput"
                                className="name-input"
                                type="text"
                                value={nombre}
                                onChange={(e) => setNombre(e.target.value)}
                                placeholder="Escribe tu nombre..."
                                onKeyDown={(e) => { if (e.key === 'Enter' && nombre.trim()) manejarEmpezar(!usarProgreso ? false : false); }}
                                autoFocus
                            />
                            <div className="progress-buttons">
                                <button
                                    className="btn-start"
                                    onClick={() => manejarEmpezar(false)}
                                    disabled={!nombre.trim()}
                                >
                                    🚀 Nuevo Juego
                                </button>
                                {usarProgreso && (
                                    <button
                                        className="btn-progress primary"
                                        onClick={() => manejarEmpezar(true)}
                                    >
                                        ⏭ Continuar desde tabla {tablaProgressDisponible}
                                    </button>
                                )}
                            </div>
                        </div>
                        {records.length > 0 && (
                            <div className="records-container">
                                <div className="records-title">🏆 TOP 3 MEJORES RECORDS</div>
                                {records.map((record, idx) => (
                                    <div key={idx} className="record-item">
                                        <span className="record-medal">
                                            {idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉'}
                                        </span>
                                        <span className="record-name">{record.nombre}</span>
                                        <div className="record-stats">
                                            <span className="record-tabla">Tabla {record.tablaAlcanzada}</span>
                                            <span className="record-score">⭐ {record.score} pts</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        <div style={{ marginTop: 16, fontSize: 14, color: '#7a5a8f' }}>
                            ⏱️ Contesta antes de que se acabe el tiempo.<br />
                            ✅ +1 punto por acierto | ❌ -1 punto por error<br />
                            🔁 Las operaciones falladas se repiten 10 veces para aprender.
                        </div>
                    </div>
                );
            }

            return (
                <div className="game-card">
                    <div className="header">
                        <div className="game-title">
                            🎯 Tablas
                            <span>{tablaActual}</span>
                        </div>
                        <div className="vidas">
                            ❤️ {vidasRestantes} / {MAX_ERRORES}
                        </div>
                        <div className={`score-display ${score < 0 ? 'negative' : ''}`}>
                            ⭐ {score} puntos
                        </div>
                    </div>
                    <div className="table-progress">
                        <div className="table-badge">
                            {tablaActual} <small>×</small>
                        </div>
                        <div className="mastery-bar">
                            <div className="mastery-track">
                                <div className="mastery-fill" style={{ width: `${masteryPercent}%` }} />
                            </div>
                            <span className="mastery-label">{Math.round(masteryPercent)}%</span>
                        </div>
                    </div>
                    {dominadasArray.length > 0 && (
                        <div className="mastered-chips">
                            {dominadasArray.map(t => (
                                <span key={t} className="mastered-chip">✅ {t}</span>
                            ))}
                            {modoRepaso && (
                                <span className="mastered-chip review">🔄 repaso {tablaRepaso}</span>
                            )}
                        </div>
                    )}
                    <div className="timer-container">
                        <div className="timer-bar">
                            <div className={`timer-fill ${timerClass}`} style={{ width: `${(tiempoRestante / TIEMPO_PREGUNTA) * 100}%` }} />
                        </div>
                        <span className="timer-text">{tiempoRestante}s</span>
                    </div>
                    <Hangman errores={errores} />
                    <div className="question-area">
                        <div className="question-text">
                            <span className="highlight">{multiplicando}</span>
                            <span className="sign">×</span>
                            <span className="highlight">{multiplicador}</span>
                            <span className="eq">=</span>
                            <span style={{ minWidth: 50, display: 'inline-block', color: '#aa88c4' }}>?</span>
                        </div>
                        <div className="options-grid">
                            {opciones.map((valor, idx) => {
                                let clase = 'option-btn';
                                const correcto = multiplicando * multiplicador;
                                if (respuestaSeleccionada !== null) {
                                    if (idx === respuestaSeleccionada) {
                                        clase += valor === correcto ? ' correct-answer' : ' wrong-answer';
                                    } else if (valor === correcto && respuestaSeleccionada !== -1) {
                                        clase += ' reveal-correct';
                                    }
                                }
                                const disabled = esperandoSiguiente || estadoJuego !== 'jugando' || respuestaSeleccionada !== null;
                                return (
                                    <button
                                        key={idx}
                                        className={clase}
                                        onClick={() => procesarRespuesta(idx)}
                                        disabled={disabled}
                                    >
                                        {valor}
                                    </button>
                                );
                            })}
                        </div>
                        <div className={`feedback ${feedback.tipo} ${feedbackAnim ? 'bounce-in' : ''}`}>
                            {feedback.mensaje}
                        </div>
                    </div>
                    {(estadoJuego === 'gameover' || estadoJuego === 'victoria') && (
                        <div className={`game-over-overlay ${estadoJuego === 'victoria' ? 'win-overlay' : ''}`}>
                            <h2>{estadoJuego === 'gameover' ? '💀 ¡Game Over!' : '🎉 ¡Ganaste!'}</h2>
                            <p className="sub">
                                {estadoJuego === 'gameover'
                                    ? `Has cometido ${errores} errores. ¡Ánimo, inténtalo de nuevo!`
                                    : `¡Dominaste todas las tablas del ${tablaInicial} al ${TABLA_MAX}! Eres una campeona.`}
                            </p>
                            <div className="game-over-score">
                                ⭐ PUNTUACIÓN FINAL: {score} puntos
                            </div>
                            <button className="btn-secondary success" onClick={reiniciarJuego} style={{ marginTop: 12 }}>
                                🔄 Volver a jugar
                            </button>
                        </div>
                    )}
                    <div className="action-row">
                        <button className="btn-secondary" onClick={reiniciarJuego}>
                            🔄 Reiniciar
                        </button>
                        <button
                            className="btn-secondary"
                            onClick={() => {
                                limpiarTimers();
                                timeoutActivoRef.current = false;
                                cargarNuevaPregunta();
                            }}
                            disabled={estadoJuego !== 'jugando'}
                        >
                            ⏭ Siguiente
                        </button>
                    </div>
                    <div style={{ marginTop: 14, fontSize: 13, color: '#9a80ab' }}>
                        👧 {nombre} · {dominadasArray.length} tablas dominadas · {contadorPreguntas} preguntas
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('✅ Service Worker registrado:', registration);
                    })
                    .catch(error => {
                        console.log('⚠️ Service Worker error:', error);
                    });
            });
        }
    </script>
</body>
</html>
